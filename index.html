<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lotto Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="light">
  <div class="container">
    <header>
      <h1>Lotto Number Generator</h1>
      <button id="theme-toggle">Dark Mode</button>
    </header>
    <main>
      <div id="ball-container">
        <div class="ball">?</div>
        <div class="ball">?</div>
        <div class="ball">?</div>
        <div class="ball">?</div>
        <div class="ball">?</div>
        <div class="ball">?</div>
      </div>
      <button id="generate-btn">Generate Numbers</button>

      <section id="partnership-section">
        <hr>
        <h2>제휴 문의</h2>
        <form id="partnership-form" action="https://formspree.io/f/xzdjwpqo" method="POST">
          <div class="form-group">
            <label for="name">이름/업체명</label>
            <input type="text" id="name" name="name" required placeholder="홍길동">
          </div>
          <div class="form-group">
            <label for="email">이메일 주소</label>
            <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
          </div>
          <div class="form-group">
            <label for="message">문의 내용</label>
            <textarea id="message" name="message" required placeholder="제휴 제안 내용을 입력해주세요."></textarea>
          </div>
          <button type="submit" id="submit-btn">문의하기</button>
          <div id="form-status"></div>
        </form>
      </section>

      <section id="comments-section">
        <hr>
        <h2>댓글</h2>
        <div id="disqus_thread"></div>
        <script>
            (function() { // DON'T EDIT BELOW THIS LINE
            var d = document, s = d.createElement('script');
            s.src = 'https://dllpoer.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
      </section>
    </main>
  </div>
  <script src="main.js"></script>
</body>
</html>
